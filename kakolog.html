<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>過去ログ - ガイア動物病院</title>
<style>
:root {
  /* イエロー一本の構成（目に優しい淡色＋読める文字だけソフトチャコール） */
  --yellow:      #FCD97D;   /* 唯一のアクセント：ヘッダー・ボタン */
  --yellow-soft: #FDE7AB;   /* アクティブ・ホバー時の淡いイエロー */
  --cream:       #FBF6EA;   /* 背景：ごく淡いクリーム */
  --cream-deep:  #F6EDD9;   /* 展開部などの一段濃いクリーム */
  --surface:     #ffffff;   /* カード：白 */
  --border:      #E8DFC9;   /* 枠線：淡いベージュグレー */
  --text:   #5c5850;        /* 文字：ソフトチャコール */
  --muted:  #96907F;        /* 補助文字：ウォームグレー */
  --hint:   #C0B9A6;        /* ヒント：淡いグレージュ */
  --money:  #5c5850;        /* 金額：色で目立たせず太字で読ませる */
  --danger: #B98A5E;        /* エラー：茶系の落ち着いたトーン（赤は使わない） */
  --bg: var(--cream);
  /* 既存クラスの互換用マッピング */
  --green: var(--yellow);
  --green-dark: var(--yellow-soft);
  --green-light: var(--cream-deep);
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
}

/* ===== ヘッダー ===== */
.header {
  background: var(--yellow);
  color: var(--text);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 10;
}
.header-title { font-size: 17px; font-weight: 700; }
.header-note {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  background: rgba(255, 255, 255, 0.7);
  border-radius: 999px;
  padding: 3px 10px;
}

/* ===== 検索フォーム ===== */
.search-panel {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px;
}
.search-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  max-width: 720px;
  margin: 0 auto;
}
.field label {
  display: block;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 4px;
  font-weight: 600;
}
.field input {
  width: 100%;
  padding: 10px 12px;
  font-size: 16px;   /* iOSのズーム防止のため16px以上 */
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #fff;
  color: var(--text);
}
.field select {
  width: 100%;
  padding: 10px 12px;
  font-size: 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #fff;
  color: var(--text);
}
.field input:focus, .field select:focus { outline: 2px solid var(--green); border-color: var(--green); }
.date-pair { display: flex; align-items: center; gap: 6px; }
.date-pair input { flex: 1; min-width: 0; }
.date-pair .tilde { color: var(--muted); flex: none; }
.search-actions {
  max-width: 720px;
  margin: 12px auto 0;
  display: flex;
  gap: 10px;
}
.btn {
  flex: 1;
  padding: 12px;
  font-size: 16px;
  font-weight: 700;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
.btn-search { background: var(--yellow); color: var(--text); }
.btn-search:active { background: var(--green-dark); }
.btn-search:disabled { background: var(--hint); }
.btn-clear {
  flex: 0 0 auto;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 12px 18px;
}

/* ===== 結果エリア ===== */
.results {
  max-width: 720px;
  margin: 0 auto;
  padding: 14px 16px 40px;
}
.result-status {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 10px;
  text-align: center;
}
.result-status.warn { color: var(--danger); font-weight: 600; }

.record-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 10px;
  overflow: hidden;
}
.record-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px;
  cursor: pointer;
  gap: 10px;
}
.record-head:active { background: var(--green-light); }
.record-main { flex: 1; min-width: 0; }
.record-date {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 2px;
}
.record-names {
  font-size: 16px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.record-total {
  font-size: 17px;
  font-weight: 700;
  color: var(--money);   /* 読みやすさ優先でピンクの深いトーン */
  flex: none;
}
.record-chevron {
  flex: none;
  color: var(--hint);
  font-size: 13px;
  transition: transform 0.15s;
}
.record-card.open .record-chevron { transform: rotate(90deg); }

.record-detail {
  display: none;
  border-top: 1px dashed var(--border);
  padding: 12px 14px;
  background: var(--cream-deep);
}
.record-card.open .record-detail { display: block; }
.detail-items {
  white-space: pre-wrap;
  font-size: 14px;
  line-height: 1.7;
  margin-bottom: 10px;
}
.detail-sums {
  border-top: 1px solid var(--border);
  padding-top: 8px;
  font-size: 14px;
}
.detail-sums .row {
  display: flex;
  justify-content: space-between;
  padding: 2px 0;
}
.detail-sums .row.total {
  font-weight: 700;
  font-size: 16px;
  color: var(--money);
}
.detail-meta {
  margin-top: 8px;
  font-size: 12px;
  color: var(--muted);
}

.empty-note {
  text-align: center;
  color: var(--hint);
  padding: 40px 0;
  font-size: 14px;
}
.loading {
  text-align: center;
  color: var(--muted);
  padding: 30px 0;
}
.spinner {
  display: inline-block;
  width: 22px;
  height: 22px;
  border: 3px solid var(--border);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">📖 過去ログ（販売記録）</div>
  <div class="header-note">閲覧専用</div>
</div>

<div class="search-panel">
  <div class="search-grid">
    <div class="field">
      <label for="qOwner">飼い主名（部分一致）</label>
      <input type="text" id="qOwner" placeholder="例：佐藤">
    </div>
    <div class="field">
      <label for="qPet">ペット名（部分一致）</label>
      <input type="text" id="qPet" placeholder="例：ポチ">
    </div>
    <div class="field">
      <label for="qAnimal">動物種</label>
      <select id="qAnimal">
        <option value="">すべて</option>
        <option value="犬">犬</option>
        <option value="猫">猫</option>
        <option value="ウサギ">ウサギ</option>
        <option value="その他">その他</option>
      </select>
    </div>
    <div class="field">
      <label for="qStaff">担当者</label>
      <select id="qStaff">
        <option value="">すべて</option>
        <option value="南繁">南繁</option>
        <option value="辻松">辻松</option>
        <option value="腰原">腰原</option>
        <option value="城戸">城戸</option>
        <option value="中出">中出</option>
        <option value="要田">要田</option>
        <option value="看護師">看護師</option>
      </select>
    </div>
    <div class="field" style="grid-column: 1 / -1;">
      <label>会計日（期間。1日だけなら同じ日を両方に）</label>
      <div class="date-pair">
        <input type="date" id="qFrom">
        <span class="tilde">〜</span>
        <input type="date" id="qTo">
      </div>
    </div>
  </div>
  <div class="search-actions">
    <button class="btn btn-search" id="searchBtn" onclick="doSearch()">🔍 検索</button>
    <button class="btn btn-clear" onclick="clearForm()">クリア</button>
  </div>
</div>

<div class="results" id="results">
  <div class="empty-note">検索条件を入力して「検索」を押してください</div>
</div>

<!-- 再印刷用エリア（画面上は非表示・印刷時のみ表示） -->
<div class="print-area" id="reprintArea"></div>

<style>
/* ===== 再印刷（明細書・再発行）用スタイル ===== */
.btn-reprint {
  margin-top: 10px;
  padding: 8px 16px;
  background: #fff;
  border: 1px solid #d8d2c4;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  color: #5c5850;
  cursor: pointer;
}
.btn-reprint:active { background: #FCD97D; }

.print-area { display: none; }
@media print {
  /* visibility:hidden だと要素の場所（高さ）が残り、検索結果の分だけ白紙ページが
     刷られてしまう。display:none で実際にレイアウトから外す。 */
  body > *:not(.print-area) { display: none !important; }
  html, body {
    margin: 0 !important;
    padding: 0 !important;
    height: auto !important;
    background: #fff !important;
  }
  .print-area { display: block !important; }
  .print-page {
    page-break-after: avoid;
    page-break-inside: avoid;
    height: auto;      /* 固定高だと余白が次ページに溢れることがある */
    min-height: 0;
  }
  @page { size: A5 portrait; margin: 0; }
}
.print-page {
  width: 148mm;
  padding: 12mm 10mm;
  background: #fff;
  position: relative;
  font-size: 11px;
  color: #000;
  font-family: 'Noto Sans JP', sans-serif;
  box-sizing: border-box;
}
.print-title {
  text-align: center;
  font-family: 'Noto Serif JP', serif;
  font-weight: 700;
  font-size: 18px;
  letter-spacing: 0.4em;
  margin: 8px 0;
}
.print-meta {
  font-size: 11px;
  line-height: 1.7;
  margin-bottom: 4px;
  display: flex;
  justify-content: space-between;
}
.print-customer {
  font-size: 14px;
  font-weight: 700;
  margin: 4px 0 8px;
}
.print-divider { border-top: 1px dashed #888; margin: 6px 0; }
.print-divider-solid { border-top: 1.5px solid #000; margin: 6px 0; }
.print-item-line {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  margin-bottom: 5px;
  gap: 8px;
}
.print-item-line .item-left { flex: 1; }
.print-item-line .item-right { white-space: nowrap; }
.print-totals-row {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  margin-bottom: 2px;
}
.print-totals-row.grand {
  font-size: 16px;
  font-weight: 700;
  margin-top: 6px;
  padding-top: 4px;
  border-top: 1.5px solid #000;
}
.print-thanks {
  margin-top: 16px;
  text-align: center;
  font-size: 10px;
  line-height: 1.7;
  color: #333;
}
.print-hospital-name {
  text-align: center;
  font-family: 'Noto Serif JP', serif;
  font-size: 16px;
  font-weight: 700;
  color: #14472d;
}
.print-hospital-info {
  text-align: center;
  font-size: 10px;
  color: #555;
  line-height: 1.5;
}
</style>

<script src="config.js"></script>
<script src="kakolog.js"></script>
</body>
</html>
